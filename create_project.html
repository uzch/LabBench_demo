<div class="breadcrumb"><a href="projects.html">Projects</a> / Create Project</div>
<h1 class="page-title">Create Project</h1>
<p class="page-sub">Input form for the Projects relation.</p>

<div class="card">
  <form action="#" method="post">
    <input type="hidden" name="created_by_user_id" value="<!-- session user_id -->" />
    <div class="form-grid single">
      <div class="form-group">
        <label for="workspace_id">Workspace</label>
        <select id="workspace_id" name="workspace_id" required>
          <option value="">Select a workspace</option>
          <option value="1">Workspace 1</option>
          <option value="2">Workspace 2</option>
        </select>
      </div>
      <div class="form-group">
        <label for="project_name">Project Name</label>
        <input type="text" id="project_name" name="project_name" maxlength="150" required />
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="Describe the project goals and scope."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit">Create Project</button>
      <a class="button secondary" href="projects.html">Cancel</a>
    </div>
  </form>
</div>
