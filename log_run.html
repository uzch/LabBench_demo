<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LabBench - Log Run</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">LABBENCH</div>
      <nav class="nav">
        <a href="projects.php">Projects</a>
        <a href="runs.html" class="active">All Runs</a>
        <a href="datasets.html">Datasets</a>
        <a href="model_registry.html">Model Registry</a>
        <a href="workspace_members.php">Workspace Members</a>
        <a href="audit_log.php">Audit Log</a>
        <a href="login.html">Log Out</a>
      </nav>
    </aside>
    <div class="main">
      <header class="header">
        <div>Log Run</div>
        <div class="header-right">Static HTML interface for Phase 3 Task B</div>
      </header>
      <main class="content">
        
<div class="breadcrumb"><a href="runs.html">Runs</a> / Log Run</div>
<h1 class="page-title">Log Run</h1>
<p class="page-sub">Input form for Runs, RunParams, and RunMetrics.</p>

<div class="card">
  <form action="#" method="post">
    <div class="form-grid">
      <div class="form-group">
        <label for="model_id">Model</label>
        <select id="model_id" name="model_id" required>
          <option value="">Select a model</option>
          <option value="<!-- model_id -->"><!-- model_name --></option>
        </select>
      </div>
      <div class="form-group">
        <label for="dataset_version_id">Dataset Version</label>
        <select id="dataset_version_id" name="dataset_version_id" required>
          <option value="">Select a dataset version</option>
          <option value="<!-- dataset_version_id -->"><!-- version_tag --></option>
        </select>
      </div>
      <div class="form-group">
        <label for="created_by_user_id">Created By</label>
        <select id="created_by_user_id" name="created_by_user_id" required>
          <option value="<!-- user_id -->"><!-- full_name --></option>
        </select>
      </div>
      <div class="form-group">
        <label for="status">Status</label>
        <select id="status" name="status" required>
          <option>queued</option>
          <option>running</option>
          <option>completed</option>
          <option>failed</option>
        </select>
      </div>
      <div class="form-group">
        <label for="started_at">Started At</label>
        <input type="datetime-local" id="started_at" name="started_at" />
      </div>
      <div class="form-group">
        <label for="ended_at">Ended At</label>
        <input type="datetime-local" id="ended_at" name="ended_at" />
      </div>
      <div class="form-group">
        <label for="code_version_tag">Code Version Tag</label>
        <input type="text" id="code_version_tag" name="code_version_tag" maxlength="100" />
      </div>
      <div class="form-group">
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes"></textarea>
      </div>
    </div>

    <div class="card" style="margin-top:18px;">
      <div class="card-title">Initial Hyperparameter</div>
      <div class="form-grid">
        <div class="form-group">
          <label for="param_key">Parameter Key</label>
          <input type="text" id="param_key" name="param_key" maxlength="100" placeholder="learning_rate" />
        </div>
        <div class="form-group">
          <label for="param_value">Parameter Value</label>
          <input type="text" id="param_value" name="param_value" maxlength="100" placeholder="0.001" />
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:18px;">
      <div class="card-title">Initial Metric</div>
      <div class="form-grid">
        <div class="form-group">
          <label for="metric_key">Metric Key</label>
          <input type="text" id="metric_key" name="metric_key" maxlength="100" placeholder="accuracy" />
        </div>
        <div class="form-group">
          <label for="metric_value">Metric Value</label>
          <input type="number" step="any" id="metric_value" name="metric_value" placeholder="0.91" />
        </div>
        <div class="form-group">
          <label for="step">Step</label>
          <input type="number" id="step" name="step" min="0" placeholder="1" />
        </div>
        <div class="form-group">
          <label for="recorded_at">Recorded At</label>
          <input type="datetime-local" id="recorded_at" name="recorded_at" />
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit">Save Run</button>
      <a class="button secondary" href="runs.html">Cancel</a>
    </div>
  </form>
</div>

      </main>
    </div>
  </div>
</body>
</html>
