<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="logo">LABBENCH</div>
      <nav class="nav">
        <a href="projects.php">Projects</a>
        <a href="runs.html">All Runs</a>
        <a href="datasets.html" class="active">Datasets</a>
        <a href="model_registry.html">Model Registry</a>
        <a href="workspace_members.php">Workspace Members</a>
        <a href="audit_log.php">Audit Log</a>
        <a href="logout.php">Log Out</a>
      </nav>
    </aside>
    <div class="main">
      <header class="header">
        <div>Create Dataset</div>
        <div class="header-right">Static HTML interface for Phase 3 Task B</div>
      </header>
      <main class="content">
        
<div class="breadcrumb"><a href="datasets.html">Datasets</a> / Create Dataset</div>
<h1 class="page-title">Create Dataset</h1>
<p class="page-sub">Input form for Datasets and the initial DatasetVersions entry.</p>

<div class="card">
  <form action="#" method="post">
    <input type="hidden" name="project_id" value="<!-- current project_id -->" />
    <div class="form-grid">
      <div class="form-group">
        <label for="dataset_name">Dataset Name</label>
        <input type="text" id="dataset_name" name="dataset_name" maxlength="150" required />
      </div>
      <div class="form-group">
        <label for="modality">Modality</label>
        <select id="modality" name="modality" required>
          <option value="">Select modality</option>
          <option>image</option>
          <option>text</option>
          <option>tabular</option>
          <option>audio</option>
          <option>video</option>
        </select>
      </div>
      <div class="form-group">
        <label for="source_type">Source Type</label>
        <select id="source_type" name="source_type" required>
          <option value="">Select source type</option>
          <option>public</option>
          <option>internal</option>
          <option>synthetic</option>
        </select>
      </div>
      <div class="form-group">
        <label for="version_tag">Initial Version Tag</label>
        <input type="text" id="version_tag" name="version_tag" maxlength="50" placeholder="v1.0" required />
      </div>
      <div class="form-group">
        <label for="row_count">Row Count</label>
        <input type="number" id="row_count" name="row_count" min="0" value="0" />
      </div>
      <div class="form-group">
        <label for="schema_hash">Schema Hash</label>
        <input type="text" id="schema_hash" name="schema_hash" maxlength="64" />
      </div>
    </div>
    <div class="form-actions">
      <button type="submit">Create Dataset</button>
      <a class="button secondary" href="datasets.html">Cancel</a>
    </div>
  </form>
</div>

      </main>
    </div>
  </div>
</body>
</html>
